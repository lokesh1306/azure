apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: env61
  labels:
    argocd.argoproj.io/agent-id: env61
  annotations:
    argocd.argoproj.io/sync-wave: "-15"
spec:
  project: default
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 0.12.1
    helm:
      releaseName: external-secrets
      valuesObject:
        installCRDs: true
        replicaCount: 2
        webhook:
          replicaCount: 2
        certController:
          replicaCount: 2
        # Workload identity: use the TF-created annotated SA, label the pod so
        # the webhook injects the federated token. Client-id lives on the SA.
        serviceAccount:
          create: false
          name: external-secrets
        podLabels:
          azure.workload.identity/use: "true"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
  destination:
    name: env61
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
