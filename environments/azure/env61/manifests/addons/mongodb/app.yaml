apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mongodb
  namespace: env61
  labels:
    app: mongodb
    environment: env61
    argocd.argoproj.io/agent-id: env61
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  destination:
    namespace: mongodb
    name: env61
  project: default
  source:
    repoURL: stackai.azurecr.io
    chart: charts/mongodb
    targetRevision: 0.1.0
    helm:
      releaseName: mongodb
      valuesObject:
        global:
          environment: env61
        version: "7.0.29"
        image:
          repository: docker.io/bitnami/mongodb
          tag: "7.0.29"
        members: 3
        storage:
          size: 50Gi
          storageClassName: managed-csi
        resources:
          requests:
            cpu: "1"
            memory: 2Gi
          limits:
            cpu: "4"
            memory: 8Gi
        security:
          authentication:
            modes:
              - SCRAM
            ignoreUnknownUsers: true
          users:
            - name: admin
              db: admin
              passwordSecretName: mongodb-admin-credentials
              scramCredentialsSecretName: mongodb-admin-scram
              roles:
                - name: clusterAdmin
                  db: admin
                - name: readWriteAnyDatabase
                  db: admin
                - name: dbAdminAnyDatabase
                  db: admin
        prometheus:
          enabled: false
        additionalMongodConfig:
          storage.wiredTiger.engineConfig.journalCompressor: snappy
          net.compression.compressors: snappy,zstd
        additionalConnectionStringConfig:
          readPreference: primaryPreferred
          w: majority
          journal: true
        podAnnotations:
          reloader.stakater.com/auto: "true"
        podDisruptionBudget:
          enabled: true
          maxUnavailable: 1
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      name: mongodb
      jsonPointers:
        - /spec/volumeClaimTemplates/0/apiVersion
        - /spec/volumeClaimTemplates/0/kind
        - /spec/volumeClaimTemplates/0/spec/volumeMode
        - /spec/volumeClaimTemplates/0/status
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
