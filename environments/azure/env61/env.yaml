name: env61
platform: byoc
cloud_environment: commercial   # commercial | usgovernment
email: devops+env61@stack-ai.com
domain: "env61.stack.ai"

# Spoke prereqs (resource group + "<name>stackaitfstate" storage account must
# already exist; created by onboarding/customer-bootstrap.sh).
tenant_id: "562d3203-96d4-4a11-85af-5f4c197ce345"
subscription_id: "c05b8dd7-5b0f-4be7-ba37-5f5a0eb52ca8"
resource_group_name: "stackai-env61-rg"
client_id: "cdf88277-851f-4a16-9694-b52d5c617107"

acr:
  server: stackai.azurecr.io

apps:
  supabase: true
  mongodb: true
  weaviate: true
  unstructured: true
  parser_service: true
  stackweb_builder: false
  temporal: true

# Supabase configuration
supabase:
  use_external_db: false
  use_s3_storage: false
  enable_saml: true

# Argo CD configuration
argocd:
  bootstrap: false

# Optional overrides
vnet_cidr: "10.50.0.0/16"
kubernetes_version: "1.35"

# Optional DNS zone — when set, the addons module binds the external-dns /
# cert-manager DNS Zone Contributor role assignments. The Key Vault is created
# by 06-secrets and its id flows to 08-apps via the stack dependency.
# dns_zone_id: "/subscriptions/.../resourceGroups/dns/providers/Microsoft.Network/dnszones/env61.stack.ai"

