apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway-api
  namespace: env64
  labels:
    argocd.argoproj.io/agent-id: env64
  annotations:
    argocd.argoproj.io/sync-wave: "-25"
spec:
  project: default
  source:
    repoURL: https://github.com/kubernetes-sigs/gateway-api.git
    targetRevision: v1.5.0
    path: config/crd/standard
    directory:
      recurse: false
      include: '*.yaml'
  destination:
    name: env64
    namespace: stackai-addons
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
