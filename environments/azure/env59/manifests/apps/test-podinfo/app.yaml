apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: test-podinfo
  namespace: env59
  labels:
    argocd.argoproj.io/agent-id: env59
spec:
  project: default
  source:
    repoURL: https://stefanprodan.github.io/podinfo
    chart: podinfo
    targetRevision: 6.9.1
    helm:
      releaseName: test-podinfo
  destination:
    name: env59
    namespace: test
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
