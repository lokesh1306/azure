apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns
  namespace: env63
  labels:
    argocd.argoproj.io/agent-id: env63
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  project: default
  source:
    repoURL: https://kubernetes-sigs.github.io/external-dns/
    chart: external-dns
    targetRevision: 1.19.0
    helm:
      releaseName: external-dns
      valuesObject:
        provider:
          name: azure
        sources:
          - gateway-httproute
        policy: upsert-only
        txtOwnerId: env63
        domainFilters:
          - env63.stack.ai
        serviceAccount:
          create: false
          name: external-dns
        podLabels:
          azure.workload.identity/use: "true"
        secretConfiguration:
          enabled: true
          mountPath: /etc/kubernetes
          data:
            azure.json: |
              {
                "tenantId": "2a377f54-325c-469f-8fa6-944a91f7a2f5",
                "subscriptionId": "40339116-837f-4e30-ba76-7a0ed1d4dcfc",
                "resourceGroup": "stackai-env63-rg",
                "useWorkloadIdentityExtension": true
              }
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
  destination:
    name: env63
    namespace: external-dns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
