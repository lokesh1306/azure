apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bootstrap-notify
  namespace: env63
  labels:
    app: bootstrap-notify
    environment: env63
    argocd.argoproj.io/agent-id: env63
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  destination:
    namespace: stackend
    name: env63
  project: default
  source:
    repoURL: stackai.azurecr.io
    chart: charts/bootstrap-notify
    targetRevision: 0.1.0
    helm:
      releaseName: bootstrap-notify
      valuesObject:
        environmentName: "env63"
        endpoints:
          - "https://env63.stack.ai"
          - "https://api.env63.stack.ai"
        loginUrl: "https://env63.stack.ai"
        supabaseDashboardUrl: "https://studio.env63.stack.ai"
        toEmails:
          - "lchallagulla@stack-ai.com"
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
    syncOptions:
      - CreateNamespace=false
