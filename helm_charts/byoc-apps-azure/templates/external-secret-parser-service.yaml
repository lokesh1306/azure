{{- if .Values.externalSecrets.parserService.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: parser-service-external-secret
  namespace: parser-service
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: azure-kv
    kind: ClusterSecretStore
  target:
    name: parser-service-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Merge
      metadata:
        annotations:
          reloader.stakater.com/match: "true"
      data:
        ENVIRONMENT: "production"
        LOG_LEVEL: "INFO"
        SERVER_HOST: "0.0.0.0"
        SERVER_PORT: "8001"
        POSTGRES_DB_NAME: "postgres"
        POSTGRES_DB_SCHEMA_NAME: "parser_service"
        TEMPORAL_SELF_HOSTED: "True"
        TEMPORAL_TLS_ENABLED: "false"
        TEMPORAL_ADDRESS: "temporal-frontend.temporal.svc.cluster.local:7233"
        TEMPORAL_NAMESPACE: "parsing"
        TEMPORAL_API_KEY: "not-required-for-self-hosted"
        TEMPORAL_CLOUD: "false"
        AWS_REGION: {{ .Values.aws.region | quote }}
        REDIS_URL: "redis://parser-service-valkey.parser-service.svc.cluster.local:6379"
        LLAMA_PARSE_API_URL: "https://api.cloud.llamaindex.ai/api"
        REDUCTO_API_URL: "https://platform.reducto.ai"
        TIKA_API_URL: "http://tika.tika.svc.cluster.local:9998/"
        OPENAI_API_URL: '{{`{{ .OPENAI_API_URL | default "https://api.openai.com/v1/chat/completions" }}`}}'
        DEEPGRAM_API_URL: '{{`{{ .DEEPGRAM_API_URL | default "https://api.deepgram.com/v1/listen" }}`}}'
        POSTGRES_DB_HOST: "supabase-supabase-db.supabase.svc.cluster.local"
        POSTGRES_DB_PORT: "5432"
        POSTGRES_DB_USER: "postgres"
        POSTGRES_DB_PASSWORD: "{{`{{ .db_password }}`}}"
        ADMIN_TOKEN: "{{`{{ .parser_admin_token }}`}}"
        API_KEY_HMAC_SECRET: "{{`{{ .parser_hmac_secret }}`}}"
        S3_BUCKET_NAME: "{{`{{ .parser_s3_bucket }}`}}"
  data:
    - secretKey: db_password
      remoteRef:
        key: {{ .Values.env }}-supabase-secrets
        property: db_password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: parser_admin_token
      remoteRef:
        key: {{ .Values.env }}-parser-secrets
        property: admin_token
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: parser_hmac_secret
      remoteRef:
        key: {{ .Values.env }}-parser-secrets
        property: api_key_hmac_secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: parser_s3_bucket
      remoteRef:
        key: {{ .Values.env }}-parser-secrets
        property: s3_bucket_name
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
  dataFrom:
    - extract:
        key: {{ .Values.env }}-customer-secrets
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
{{- end }}
