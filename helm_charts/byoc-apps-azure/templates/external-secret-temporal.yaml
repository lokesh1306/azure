{{- if .Values.externalSecrets.temporal.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: temporal-postgres-external-secret
  namespace: temporal
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: azure-kv
    kind: ClusterSecretStore
  target:
    name: temporal-postgres
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: password
      remoteRef:
        key: {{ .Values.env }}-temporal-secrets
        property: db_password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: postgresql-password
      remoteRef:
        key: {{ .Values.env }}-temporal-secrets
        property: db_password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
{{- end }}
