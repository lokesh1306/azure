{{- if .Values.externalSecrets.supabase.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: supabase-saml-secrets-external-secret
  namespace: supabase
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: azure-kv
    kind: ClusterSecretStore
  target:
    name: supabase-saml-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Merge
      metadata:
        annotations:
          reloader.stakater.com/match: "true"
      data:
        GOTRUE_SAML_PRIVATE_KEY: "{{`{{ .saml_private_key }}`}}"
  dataFrom:
    - extract:
        key: {{ .Values.env }}-supabase-secrets
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: supabase-db-external-secret
  namespace: supabase
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: azure-kv
    kind: ClusterSecretStore
  target:
    name: supabase-db-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Merge
      metadata:
        annotations:
          reloader.stakater.com/match: "true"
      data:
        password: "{{`{{ .password }}`}}"
        password_encoded: "{{`{{ .password | urlquery }}`}}"
        database: "postgres"
  data:
    - secretKey: password
      remoteRef:
        key: {{ .Values.env }}-supabase-secrets
        property: db_password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: supabase-secrets-external-secret
  namespace: supabase
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: azure-kv
    kind: ClusterSecretStore
  target:
    name: supabase-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Merge
      metadata:
        annotations:
          reloader.stakater.com/match: "true"
      data:
