{{- if .Values.certManager.enabled }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.certManager.issuerName }}
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  acme:
    server: {{ .Values.certManager.acmeServer }}
    email: {{ .Values.certManager.email | quote }}
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      - dns01:
          azureDNS:
            subscriptionID: {{ .Values.certManager.subscriptionID | quote }}
            resourceGroupName: {{ .Values.certManager.resourceGroupName | quote }}
            hostedZoneName: {{ .Values.certManager.hostedZoneName | quote }}
            environment: AzurePublicCloud
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.tlsSecretName }}
  namespace: istio-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  secretName: {{ .Values.tlsSecretName }}
  issuerRef:
    name: {{ .Values.certManager.issuerName }}
    kind: ClusterIssuer
  commonName: {{ .Values.certManager.domain | quote }}
  dnsNames:
    - {{ .Values.certManager.domain | quote }}
    - {{ printf "*.%s" .Values.certManager.domain | quote }}
{{- end }}
