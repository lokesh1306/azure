{{- if .Values.gateway.restricted.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: restricted-gateway-options
  namespace: istio-system
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  deployment: |
    spec:
      replicas: {{ .Values.gateway.restricted.replicas }}
  service: |
    spec:
      type: LoadBalancer
      externalTrafficPolicy: Local
      {{- with .Values.gateway.restricted.sourceRanges }}
      loadBalancerSourceRanges:
        {{- range . }}
        - {{ . | quote }}
        {{- end }}
      {{- end }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: restricted
  namespace: istio-system
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  gatewayClassName: istio
  infrastructure:
    parametersRef:
      group: ""
      kind: ConfigMap
      name: restricted-gateway-options
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - group: ''
            name: {{ .Values.gateway.restricted.tlsSecretName | default .Values.tlsSecretName }}
            kind: Secret
      allowedRoutes:
        namespaces:
          from: All
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: restricted
  namespace: istio-system
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: restricted-istio
  minReplicas: {{ .Values.gateway.restricted.hpa.minReplicas }}
  maxReplicas: {{ .Values.gateway.restricted.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.gateway.restricted.hpa.cpuTarget }}
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: restricted
  namespace: istio-system
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  minAvailable: {{ .Values.gateway.restricted.pdb.minAvailable }}
  selector:
    matchLabels:
      gateway.networking.k8s.io/gateway-name: restricted
{{- end }}
