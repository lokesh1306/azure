{{- if .Values.teleportRbac.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: teleport-developers
  namespace: {{ .Values.teleportRbac.namespace }}
subjects:
  - kind: Group
    name: {{ .Values.teleportRbac.group | quote }}
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: {{ .Values.teleportRbac.clusterRole }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}
