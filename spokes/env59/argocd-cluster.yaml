apiVersion: v1
kind: Namespace
metadata:
  name: env59
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: env59-client-tls
  namespace: argocd
spec:
  secretName: env59-client-tls
  duration: 8760h
  renewBefore: 720h
  privateKey:
    algorithm: ECDSA
    size: 256
  commonName: env59
  usages:
    - client auth
  issuerRef:
    name: internal-ca
    kind: ClusterIssuer
---
apiVersion: v1
kind: Secret
metadata:
  name: env59-cluster
  namespace: argocd
  annotations:
    argoproj.io/skip-reconcile: "true"
  labels:
    argocd.argoproj.io/secret-type: cluster
    argocd-agent.argoproj-labs.io/agent-name: env59
type: Opaque
stringData:
  name: env59
  server: "https://argocd-agent-resource-proxy.argocd.svc:9090?agentName=env59"
  config: |
    {
      "tlsClientConfig": {
        "insecure": false,
        "caData":   "",
        "certData": "",
        "keyData":  ""
      }
    }
