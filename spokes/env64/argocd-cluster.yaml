apiVersion: v1
kind: Namespace
metadata:
  name: env64
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: env64-client-tls
  namespace: argocd
spec:
  secretName: env64-client-tls
  duration: 8760h
  renewBefore: 720h
  privateKey:
    algorithm: ECDSA
    size: 256
  commonName: env64
  usages:
    - client auth
  issuerRef:
    name: internal-ca
    kind: ClusterIssuer
---
apiVersion: v1
kind: Secret
metadata:
  name: env64-cluster
  namespace: argocd
  annotations:
    argoproj.io/skip-reconcile: "true"
  labels:
    argocd.argoproj.io/secret-type: cluster
    argocd-agent.argoproj-labs.io/agent-name: env64
type: Opaque
stringData:
  name: env64
  server: "https://argocd-agent-resource-proxy.argocd.svc:9090?agentName=env64"
  #   kubectl get secret -n addons internal-ca -o jsonpath='{.data.tls\.crt}'
  #   kubectl get secret -n argocd env64-client-tls -o jsonpath='{.data.tls\.crt}'
  #   kubectl get secret -n argocd env64-client-tls -o jsonpath='{.data.tls\.key}'
  config: |
    {
      "tlsClientConfig": {
        "insecure": false,
        "caData":   "",
        "certData": "",
        "keyData":  ""
      }
    }
---
apiVersion: spire.spiffe.io/v1alpha1
kind: ClusterStaticEntry
metadata:
  name: env64-node-alias
  annotations:
    argocd.argoproj.io/sync-wave: "-11"
spec:
  spiffeID: spiffe://stack.ai/cluster/env64/node
  parentID: spiffe://stack.ai/spire/server
  selectors:
    - azure_imds:subscription-id:c05b8dd7-5b0f-4be7-ba37-5f5a0eb52ca8
    - azure_imds:resource-group:mc_stackai-env64-rg_env64-aks_eastus
---
apiVersion: spire.spiffe.io/v1alpha1
kind: ClusterStaticEntry
metadata:
  name: env64-argocd-agent-agent
  annotations:
    argocd.argoproj.io/sync-wave: "-11"
spec:
  spiffeID: spiffe://stack.ai/cluster/env64/ns/stackai-addons/sa/argocd-agent-agent
  parentID: spiffe://stack.ai/cluster/env64/node
  selectors:
    - k8s:ns:stackai-addons
    - k8s:sa:argocd-agent-agent
