apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-cni
  namespace: __ENV_NAME__
  labels:
    app: istio-cni
    argocd.argoproj.io/agent-id: __ENV_NAME__
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  sources:
    - repoURL: https://istio-release.storage.googleapis.com/charts
      chart: cni
      targetRevision: "1.29.4"
      helm:
        releaseName: istio-cni
        valuesObject:
          profile: ambient
          cni:
            cniConfName: "15-azure-swift-overlay.conflist"
            ambient:
              ipv6: false
  destination:
    name: __ENV_NAME__
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
