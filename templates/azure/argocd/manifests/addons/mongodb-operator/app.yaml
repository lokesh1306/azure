apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mongodb-operator
  namespace: __ENV_NAME__
  labels:
    app: mongodb-operator
    environment: __ENV_NAME__
    argocd.argoproj.io/agent-id: __ENV_NAME__
  annotations:
    argocd.argoproj.io/sync-wave: "-15"
spec:
  destination:
    namespace: mongodb-operator
    name: __ENV_NAME__
  project: default
  source:
    repoURL: https://mongodb.github.io/helm-charts
    chart: community-operator
    targetRevision: "0.12.0"
    helm:
      releaseName: mongodb-operator
      valuesObject:
        operator:
          watchNamespace: "*"
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
