apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stackend
  namespace: __ENV_NAME__
  labels:
    app: stackend
    environment: __ENV_NAME__
    argocd.argoproj.io/agent-id: __ENV_NAME__
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: stackai.azurecr.io
    chart: charts/stackend
    targetRevision: 0.1.0
    helm:
      releaseName: stackend
      valuesObject:
        deploymentAnnotations:
          reloader.stakater.com/auto: "true"
        image:
          repository: stackai.azurecr.io/stackai/stackend-backend
          pullPolicy: IfNotPresent
          tag: v2.4.2
        serviceAccount:
          create: true
        ingress:
          enabled: false
        valkey:
          enabled: true
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          image:
            repository: stackai.azurecr.io/valkey/valkey
        cache:
          connection:
            secretName: ""
          urls:
            redis: "redis://stackend-valkey.stackend.svc.cluster.local:6379"
        temporal:
          address: "temporal-frontend.temporal.svc.cluster.local:7233"
          tls:
            enabled: false
          cloud: false
          connection:
            secretName: ""
            credentials:
              namespace: "parsing"
              apiKey: "not-required-for-self-hosted"
        workers:
          temporal:
            enabled: true
        marketplace:
          enabled: false
        migration:
          enabled: true
        postMigration:
          enabled: true
        createOrg:
          enabled: true
        imagePullSecrets:
          - name: acr-pull-secret
        kubectlImage:
          repository: stackai.azurecr.io/bitnami/kubectl
        postgresImage:
          repository: stackai.azurecr.io/common/postgres
  destination:
    namespace: stackend
    name: __ENV_NAME__
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
