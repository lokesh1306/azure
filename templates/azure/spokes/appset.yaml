apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: __ENV_NAME__-fanout
  namespace: __ENV_NAME__
spec:
  goTemplate: true
  generators:
    - git:
        repoURL: https://github.com/lokesh1306/azure.git
        revision: main
        files:
          - path: "environments/azure/__ENV_NAME__/manifests/system/*/app.yaml"
          - path: "environments/azure/__ENV_NAME__/manifests/addons/*/app.yaml"
          - path: "environments/azure/__ENV_NAME__/manifests/observability/*/app.yaml"
  strategy:
    type: RollingSync
    rollingSync:
      steps:
        - matchExpressions:
            - key: tier
              operator: In
              values: [system]
        - matchExpressions:
            - key: tier
              operator: In
              values: [addons]
        - matchExpressions:
            - key: tier
              operator: In
              values: [observability]
  template:
    metadata:
      name: '{{ index .path.segments 4 }}-{{ .metadata.name }}'
      labels:
        tier: '{{ index .path.segments 4 }}'
        environment: __ENV_NAME__
        argocd.argoproj.io/agent-id: __ENV_NAME__
        managed-by: __ENV_NAME__-fanout
    spec:
      project: default
      destination:
        name: __ENV_NAME__
        namespace: '{{ .spec.destination.namespace }}'
      syncPolicy:
        automated:
          prune: false
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
  templatePatch: |
    spec:
      {{- if hasKey .spec "sources" }}
      sources: {{ toYaml .spec.sources | nindent 8 }}
      {{- else }}
      source: {{ toYaml .spec.source | nindent 8 }}
      {{- end }}
      {{- if hasKey .spec "ignoreDifferences" }}
      ignoreDifferences: {{ toYaml .spec.ignoreDifferences | nindent 8 }}
      {{- end }}
      {{- if hasKey .spec "syncPolicy" }}
      syncPolicy: {{ toYaml .spec.syncPolicy | nindent 8 }}
      {{- end }}
